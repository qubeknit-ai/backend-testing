name: AutoBidder Cron Job

on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch:       # Enable manual triggering from GitHub UI

jobs:
  bid:
    name: Run Bidding Cycle
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We skip playwright install to save time, as bidding uses httpx
          pip install -r requirements.txt

      - name: Execute Bidding Cycle
        env:
          # Database and Keys from GitHub Secrets
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          N8N_WEBHOOK_API_KEY: ${{ secrets.N8N_WEBHOOK_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          
          # Webhooks for AI and Bidding
          FREELANCER_PROPOSAL_WEBHOOK_URL: ${{ secrets.FREELANCER_PROPOSAL_WEBHOOK_URL }}
          FREELANCER_WEBHOOK_URL: ${{ secrets.FREELANCER_WEBHOOK_URL }}
          UPWORK_WEBHOOK_URL: ${{ secrets.UPWORK_WEBHOOK_URL }}
          FREELANCER_PLUS_WEBHOOK_URL: ${{ secrets.FREELANCER_PLUS_WEBHOOK_URL }}
          PROPOSAL_GENERATOR_WEBHOOK_URL: ${{ secrets.PROPOSAL_GENERATOR_WEBHOOK_URL }}
          NOTIFICATIONS_WEBHOOK_URL: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}
        run: |
          python cron_bidding.py
